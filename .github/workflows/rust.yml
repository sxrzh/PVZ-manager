name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Debug
      run: cargo build --verbose
    - name: Build Release
      run: cargo build --verbose --release
    - name: Build Release Simple
      run: cargo build --verbose --release --features simple
    - name: Build Release Large
      run: cargo build --verbose --release --features large-font
    - name: Build Release Simple Large
      run: cargo build --verbose --release --features simple,large-font
